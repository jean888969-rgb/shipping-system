<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>出貨請款系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh;}
.topbar{background:#fff;padding:12px 16px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.topbar-title{font-size:16px;font-weight:600;flex:1;}
.content{padding:12px;}
.card{background:#fff;border-radius:12px;border:1px solid #e5e5e5;overflow:hidden;margin-bottom:12px;}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid #f0f0f0;}
.card-title{font-size:13px;color:#888;}
.row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid #f5f5f7;}
.row:last-child{border-bottom:none;}
.row-label{font-size:13px;color:#888;width:70px;flex-shrink:0;}
.row-val{font-size:14px;flex:1;}
.row-val.ph{color:#bbb;}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:500;}
.badge-pending{background:#FFF3CD;color:#856404;}
.badge-void{background:#fde;color:#c00;}
.badge-ok{background:#d4edda;color:#155724;}
.badge-received{background:#d1ecf1;color:#0c5460;}
.btn-primary{background:#534AB7;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:600;width:100%;cursor:pointer;margin-top:8px;}
.btn-secondary{background:#fff;color:#534AB7;border:1px solid #534AB7;border-radius:10px;padding:12px;font-size:14px;width:100%;cursor:pointer;margin-top:8px;}
.btn-small{background:#EEEDFE;color:#534AB7;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;}
.btn-small-green{background:#d4edda;color:#155724;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;}
.nav{display:grid;grid-template-columns:repeat(4,1fr);background:#fff;border-top:1px solid #e5e5e5;position:fixed;bottom:0;left:0;right:0;}
.nav-item{padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;}
.nav-icon{font-size:20px;}
.nav-label{font-size:10px;color:#888;}
.nav-item.active .nav-label{color:#534AB7;font-weight:600;}
.page{display:none;padding-bottom:70px;}
.page.active{display:block;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-card{background:#fff;border-radius:12px;padding:14px;border:1px solid #e5e5e5;}
.stat-label{font-size:12px;color:#888;margin-bottom:6px;}
.stat-val{font-size:22px;font-weight:700;color:#1d1d1f;}
.stat-val.purple{color:#534AB7;}
.list-row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid #f5f5f7;gap:10px;cursor:pointer;}
.list-row:last-child{border-bottom:none;}
.list-no{font-size:12px;font-weight:600;color:#534AB7;width:76px;flex-shrink:0;}
.list-info{flex:1;}
.list-client{font-size:13px;font-weight:500;}
.list-date{font-size:11px;color:#888;margin-top:2px;}
.list-right{text-align:right;}
.list-amt{font-size:14px;font-weight:600;}
.list-amt.void{color:#bbb;text-decoration:line-through;}
.item-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid #f5f5f7;gap:10px;}
.item-row:last-child{border-bottom:none;}
.item-info{flex:1;}
.item-name{font-size:13px;font-weight:500;}
.item-price{font-size:11px;color:#888;margin-top:2px;}
.qty-box{display:flex;flex-direction:column;align-items:center;gap:2px;}
.qty-label{font-size:10px;color:#aaa;}
.qty-input{width:64px;height:36px;border:1.5px solid #534AB7;border-radius:8px;font-size:15px;font-weight:600;text-align:center;background:#fff;color:#1d1d1f;}
.item-subtotal{font-size:13px;font-weight:600;min-width:56px;text-align:right;}
.del-btn{color:#bbb;background:none;border:none;font-size:18px;cursor:pointer;padding:0 4px;}
.total-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:#fff;border-top:1px solid #f0f0f0;}
.total-label{font-size:13px;color:#888;}
.total-val{font-size:18px;font-weight:700;}
.sheet-overlay{background:rgba(0,0,0,0.4);position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;display:flex;align-items:flex-end;}
.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:70vh;overflow-y:auto;padding-bottom:20px;}
.sheet-handle{width:36px;height:4px;background:#ddd;border-radius:99px;margin:12px auto 8px;}
.sheet-title{font-size:14px;font-weight:600;padding:4px 16px 12px;border-bottom:1px solid #f0f0f0;}
.sheet-item{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid #f5f5f7;gap:10px;}
.sheet-item:last-child{border-bottom:none;}
.sheet-item-info{flex:1;}
.sheet-item-name{font-size:14px;}
.sheet-item-price{font-size:12px;color:#888;margin-top:2px;}
.sheet-add-btn{background:#EEEDFE;color:#534AB7;border:none;border-radius:99px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;}
.sheet-added{font-size:12px;color:#bbb;}
.empty{padding:32px 16px;text-align:center;color:#aaa;font-size:13px;}
.modal-overlay{background:rgba(0,0,0,0.4);position:fixed;top:0;left:0;right:0;bottom:0;z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:340px;padding:20px;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:12px;}
.modal-msg{font-size:14px;color:#555;margin-bottom:12px;line-height:1.5;}
.modal-btns{display:flex;gap:8px;margin-top:12px;}
.modal-btns button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;}
.modal-cancel{background:#f5f5f7;color:#555;}
.modal-confirm-red{background:#c00;color:#fff;}
.modal-confirm-blue{background:#534AB7;color:#fff;}
.modal-confirm-green{background:#28a745;color:#fff;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:12px;}
.loading-spinner{width:36px;height:36px;border:3px solid #e5e5e5;border-top-color:#534AB7;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:14px;color:#888;}
.inv-total-box{background:#EEEDFE;border-radius:12px;padding:14px;margin:0 0 12px;display:flex;justify-content:space-between;align-items:center;}
.inv-total-label{font-size:13px;color:#3C3489;}
.inv-total-val{font-size:22px;font-weight:700;color:#3C3489;}
.select-btn{display:flex;align-items:center;padding:13px 14px;border-bottom:1px solid #f5f5f7;cursor:pointer;}
.select-btn:last-child{border-bottom:none;}
.select-btn-name{flex:1;font-size:14px;}
.select-active{color:#534AB7;font-weight:600;}
input[type=date]{border:1px solid #e5e5e5;border-radius:8px;padding:8px 10px;font-size:14px;background:#fff;color:#1d1d1f;}
.method-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:8px 0;}
.method-btn{padding:10px 4px;border-radius:8px;border:1.5px solid #e5e5e5;background:#fff;font-size:13px;cursor:pointer;text-align:center;}
.method-btn.selected{border-color:#534AB7;background:#EEEDFE;color:#534AB7;font-weight:600;}
.inv-record-row{padding:12px 14px;border-bottom:1px solid #f5f5f7;}
.inv-record-row:last-child{border-bottom:none;}
.inv-record-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.inv-record-no{font-size:12px;font-weight:600;color:#534AB7;}
.inv-record-amt{font-size:14px;font-weight:700;}
.inv-record-bottom{display:flex;align-items:center;justify-content:space-between;}
.inv-record-info{font-size:12px;color:#888;}
.inv-record-actions{display:flex;gap:6px;}
.saving-bar{background:#534AB7;color:#fff;text-align:center;padding:8px;font-size:13px;position:fixed;top:0;left:0;right:0;z-index:500;}

@media print {
  body>*{display:none !important;}
  #print-area{display:block !important;padding:20px;font-family:'微軟正黑體','Microsoft JhengHei',sans-serif;}
  .print-header{text-align:center;border-bottom:2px solid #000;padding-bottom:12px;margin-bottom:16px;}
  .print-company{font-size:22px;font-weight:700;margin-bottom:4px;}
  .print-title{font-size:18px;font-weight:700;letter-spacing:4px;margin-top:8px;}
  .print-meta{display:flex;justify-content:space-between;margin-bottom:16px;font-size:13px;}
  .print-meta-left{line-height:2;}
  .print-meta-right{line-height:2;text-align:right;}
  .print-table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:13px;}
  .print-table th{background:#f0f0f0;border:1px solid #999;padding:6px 10px;text-align:center;}
  .print-table td{border:1px solid #999;padding:6px 10px;text-align:center;}
  .print-table td.left{text-align:left;}
  .print-total{text-align:right;font-size:15px;font-weight:700;margin-bottom:24px;}
  .print-sign{display:flex;justify-content:flex-end;gap:60px;margin-top:40px;font-size:13px;}
  .print-sign-item{text-align:center;border-top:1px solid #000;padding-top:4px;min-width:80px;}
}
#print-area{display:none;}
</style>
</head>
<body>
<div id="app"><div class="loading-screen"><div class="loading-spinner"></div><div class="loading-text">系統載入中...</div></div></div>
<div id="print-area"></div>
<script>
const API = 'https://script.google.com/macros/s/AKfycbyoeU1O76SJXych5ZHBilpPuiD1JqZUCECJ21sbdgZc0JYaNZu3WwPEX5BR5IdxzkePeA/exec';
const MY_COMPANY = '裕元企業社';

let state = {
  page: 'home',
  customers: [],
  itemMap: {},
  shipments: [],
  invoices: [],
  nextNo: '',
  newShipment: { customer: '', date: today(), items: [], note: '' },
  selectedShipment: null,
  selectedShipmentStatus: null,
  showItemSheet: false,
  showVoidModal: false,
  showUnvoidModal: false,
  showPaymentModal: false,
  paymentInvoiceNo: '',
  paymentDate: today(),
  paymentMethod: '',
  invoiceCustomer: '',
  saving: false,
  ready: false
};

function today() { return new Date().toISOString().split('T')[0]; }

function toROC(dateStr) {
  const d = new Date(dateStr);
  return '民國 '+(d.getFullYear()-1911)+' 年 '+(d.getMonth()+1)+' 月';
}

function toROCFull(dateStr) {
  const d = new Date(dateStr);
  return '民國 '+(d.getFullYear()-1911)+' 年 '+(d.getMonth()+1)+' 月 '+d.getDate()+' 日';
}

async function api(params) {
  const url = API + '?' + new URLSearchParams(params);
  const res = await fetch(url);
  const json = await res.json();
  return json.result;
}

// 只在啟動時載入一次所有資料
async function init() {
  const data = await api({ action: 'init' });
  state.customers = data.customers;
  state.itemMap = data.itemMap;
  state.shipments = data.shipments;
  state.invoices = data.invoices;
  state.nextNo = data.nextNo;
  state.ready = true;
  render();
}

async function saveShipment() {
  if (!state.newShipment.customer) return alert('請選擇客戶');
  if (state.newShipment.items.length === 0) return alert('請新增品項');
  if (state.newShipment.items.some(i => !i.qty || i.qty <= 0)) return alert('請填寫所有品項數量');

  const no = state.nextNo;
  const s = state.newShipment;

  // 立刻更新本地狀態，不等API
  s.items.forEach(item => {
    state.shipments.unshift({
      no, date: s.date, customer: s.customer,
      item: item.name, qty: item.qty, price: item.price,
      subtotal: item.qty * item.price, status: '待請款', note: s.note
    });
  });

  // 更新下一個流水號
  const parts = no.split('-');
  state.nextNo = parts[0] + '-' + String(parseInt(parts[1]) + 1).padStart(3, '0');
  state.newShipment = { customer: '', date: today(), items: [], note: '' };
  state.page = 'records';
  render();

  // 背景儲存
  state.saving = true; render();
  await api({ action: 'saveShipment', no, date: s.date, customer: s.customer, items: JSON.stringify(s.items), note: s.note });
  state.saving = false;
  render();
}

async function voidShipment() {
  const no = state.selectedShipment;
  // 立刻更新本地
  state.shipments.filter(s => s.no === no).forEach(s => s.status = '作廢');
  state.showVoidModal = false;
  state.selectedShipment = null;
  render();
  // 背景儲存
  await api({ action: 'voidShipment', no });
}

async function unvoidShipment() {
  const no = state.selectedShipment;
  state.shipments.filter(s => s.no === no).forEach(s => s.status = '待請款');
  state.showUnvoidModal = false;
  state.selectedShipment = null;
  render();
  await api({ action: 'unvoidShipment', no });
}

async function saveInvoice() {
  const rows = getInvoiceRows();
  if (rows.length === 0) return alert('沒有待請款紀錄');
  const groups = groupShipments(rows);
  const total = getTotalAmt(rows);
  const nos = groups.map(g => g.no).join(',');

  // 先列印
  printInvoiceData(rows, groups, total);

  // 立刻更新本地狀態
  const invoiceNo = 'INV-' + new Date().getFullYear() + '-' + String(state.invoices.length + 1).padStart(3, '0');
  state.shipments.filter(s => nos.split(',').includes(s.no + '')).forEach(s => s.status = '已請款');
  state.invoices.unshift({
    invoiceNo, date: today(), customer: state.invoiceCustomer,
    totalAmt: total, shipmentNos: nos, itemCount: rows.length,
    status: '已請款', receiveDate: '', receiveMethod: ''
  });
  render();

  // 背景儲存
  state.saving = true; render();
  await api({ action: 'saveInvoice', date: today(), customer: state.invoiceCustomer, totalAmt: total, shipmentNos: nos, details: JSON.stringify(rows) });
  state.saving = false;
  render();
}

async function confirmPayment() {
  if (!state.paymentMethod) return alert('請選擇收款方式');
  const invNo = state.paymentInvoiceNo;
  const inv = state.invoices.find(i => i.invoiceNo === invNo);
  if (inv) { inv.status = '已收款'; inv.receiveDate = state.paymentDate; inv.receiveMethod = state.paymentMethod; }
  state.showPaymentModal = false;
  state.paymentInvoiceNo = '';
  state.paymentMethod = '';
  render();
  await api({ action: 'confirmPayment', invoiceNo: invNo, receiveDate: state.paymentDate, receiveMethod: state.paymentMethod });
}

function printInvoiceByNo(invoiceNo) {
  const inv = state.invoices.find(i => i.invoiceNo === invoiceNo);
  if (!inv) return alert('找不到請款單資料');
  const nos = (inv.shipmentNos + '').split(',');
  const rows = state.shipments.filter(s => nos.includes(s.no + ''));
  const groups = groupShipments(rows);
  printInvoiceData(rows, groups, Number(inv.totalAmt), inv.customer, inv.date);
}

function printInvoiceData(rows, groups, total, customer, date) {
  const cust = customer || state.invoiceCustomer;
  const dt = date || today();
  let tableRows = ''; let idx = 1;
  groups.forEach(g => {
    g.items.forEach(item => {
      tableRows += `<tr><td>${idx++}</td><td class="left">${item.item}</td><td>${item.qty}</td><td>$${Number(item.price).toLocaleString()}</td><td>$${Number(item.subtotal).toLocaleString()}</td><td>${toROCFull(g.date)}</td></tr>`;
    });
  });
  document.getElementById('print-area').innerHTML = `
    <div class="print-header"><div class="print-company">${MY_COMPANY}</div><div class="print-title">請　款　單</div></div>
    <div class="print-meta">
      <div class="print-meta-left"><div>請款對象：${cust}</div><div>請款月份：${toROC(dt)}</div></div>
      <div class="print-meta-right"><div>開立日期：${toROCFull(dt)}</div><div>出貨單數：${groups.length} 張</div></div>
    </div>
    <table class="print-table">
      <thead><tr><th>項次</th><th>品項名稱</th><th>數量</th><th>單價</th><th>小計</th><th>出貨日期</th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
    <div class="print-total">請款總金額：$${total.toLocaleString()} 元整</div>
    <div class="print-sign"><div class="print-sign-item">製單</div><div class="print-sign-item">核准</div><div class="print-sign-item">收款確認</div></div>`;
  window.print();
}

function getMonthShipments() {
  const m = new Date().toISOString().slice(0,7);
  return state.shipments.filter(s => (s.date+'').slice(0,7)===m && s.status!=='作廢');
}

function getTotalAmt(rows) { return rows.reduce((s,r) => s+(Number(r.subtotal)||0), 0); }

function getInvoiceRows() {
  if (!state.invoiceCustomer) return [];
  return state.shipments.filter(s => s.customer===state.invoiceCustomer && s.status==='待請款');
}

function groupShipments(rows) {
  const map = {};
  rows.forEach(r => {
    if (!map[r.no]) map[r.no] = { no:r.no, date:r.date, customer:r.customer, status:r.status, total:0, items:[] };
    map[r.no].total += Number(r.subtotal)||0;
    map[r.no].items.push(r);
  });
  return Object.values(map).sort((a,b) => b.no>a.no?1:-1);
}

function render() {
  document.getElementById('app').innerHTML = buildApp();
  bindEvents();
}

function buildApp() {
  if (!state.ready) return '<div class="loading-screen"><div class="loading-spinner"></div><div class="loading-text">系統載入中...</div></div>';
  let html = '';
  if (state.saving) html += '<div class="saving-bar">儲存中...</div>';
  html += buildNav() + buildPages();
  if (state.showItemSheet) html += buildItemSheet();
  if (state.showVoidModal) html += buildVoidModal();
  if (state.showUnvoidModal) html += buildUnvoidModal();
  if (state.showPaymentModal) html += buildPaymentModal();
  return html;
}

function buildNav() {
  return `<nav class="nav">${[
    {id:'home',icon:'🏠',label:'總覽'},
    {id:'new',icon:'📦',label:'新增'},
    {id:'records',icon:'📋',label:'紀錄'},
    {id:'invoice',icon:'💰',label:'請款'}
  ].map(p=>`<button class="nav-item ${state.page===p.id?'active':''}" onclick="setPage('${p.id}')">
    <span class="nav-icon">${p.icon}</span><span class="nav-label">${p.label}</span>
  </button>`).join('')}</nav>`;
}

function buildPages() {
  return `
    <div class="page ${state.page==='home'?'active':''}">${buildHome()}</div>
    <div class="page ${state.page==='new'?'active':''}">${buildNew()}</div>
    <div class="page ${state.page==='records'?'active':''}">${buildRecords()}</div>
    <div class="page ${state.page==='invoice'?'active':''}">${buildInvoice()}</div>`;
}

function buildHome() {
  const month = getMonthShipments();
  const groups = groupShipments(month);
  const total = getTotalAmt(month);
  const pending = getTotalAmt(month.filter(s=>s.status==='待請款'));
  return `
    <div class="topbar"><span class="topbar-title">出貨請款系統</span></div>
    <div class="content">
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">本月出貨筆數</div><div class="stat-val">${groups.length}</div></div>
        <div class="stat-card"><div class="stat-label">本月出貨金額</div><div class="stat-val">$${total.toLocaleString()}</div></div>
        <div class="stat-card" style="grid-column:1/-1"><div class="stat-label">待請款金額</div><div class="stat-val purple">$${pending.toLocaleString()}</div></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">最近出貨紀錄</span></div>
        ${groups.length===0?'<div class="empty">本月尚無出貨紀錄</div>':
          groups.slice(0,5).map(g=>`
            <div class="list-row">
              <div class="list-no">${g.no}</div>
              <div class="list-info"><div class="list-client">${g.customer}</div><div class="list-date">${g.date}</div></div>
              <div class="list-right">
                <div class="list-amt ${g.status==='作廢'?'void':''}">$${g.total.toLocaleString()}</div>
                <span class="badge badge-${g.status==='待請款'?'pending':g.status==='作廢'?'void':'ok'}">${g.status}</span>
              </div>
            </div>`).join('')}
      </div>
    </div>`;
}

function buildNew() {
  const s = state.newShipment;
  const total = s.items.reduce((sum,i)=>sum+(i.qty*i.price||0),0);
  return `
    <div class="topbar"><span class="topbar-title">新增出貨單</span></div>
    <div class="content">
      <div class="card">
        <div class="row"><span class="row-label">客戶</span>
          <span class="row-val ${!s.customer?'ph':''}" id="sel-customer" style="cursor:pointer">${s.customer||'選擇客戶 ›'}</span>
        </div>
        <div class="row"><span class="row-label">出貨日期</span>
          <input type="date" value="${s.date}" id="inp-date" style="border:none;font-size:14px;flex:1;outline:none;">
        </div>
        <div class="row"><span class="row-label">單號</span>
          <span class="row-val" style="color:#534AB7;font-weight:600;">${state.nextNo}</span>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">出貨品項（${s.items.length} 項）</span>
          ${s.customer?`<button class="btn-small" id="btn-add-item">+ 新增品項</button>`:''}
        </div>
        ${s.items.length===0?`<div class="empty">${s.customer?'點右上角新增品項':'請先選擇客戶'}</div>`:
          s.items.map((item,i)=>`
            <div class="item-row">
              <div class="item-info"><div class="item-name">${item.name}</div><div class="item-price">$${item.price} / 個</div></div>
              <div class="qty-box"><span class="qty-label">數量</span>
                <input class="qty-input" type="number" inputmode="numeric" value="${item.qty||''}" data-idx="${i}" placeholder="0">
              </div>
              <div class="item-subtotal">$${((item.qty||0)*item.price).toLocaleString()}</div>
              <button class="del-btn" data-del="${i}">×</button>
            </div>`).join('')}
        ${s.items.length>0?`<div class="total-bar"><span class="total-label">合計</span><span class="total-val">$${total.toLocaleString()}</span></div>`:''}
      </div>
      <div class="card">
        <div class="row"><span class="row-label">備註</span>
          <input id="inp-note" placeholder="選填" value="${s.note}" style="border:none;outline:none;flex:1;font-size:14px;">
        </div>
      </div>
      <button class="btn-primary" id="btn-save">儲存出貨單</button>
    </div>`;
}

function buildRecords() {
  const groups = groupShipments(state.shipments);
  return `
    <div class="topbar"><span class="topbar-title">出貨紀錄</span></div>
    <div class="content"><div class="card">
      ${groups.length===0?'<div class="empty">尚無出貨紀錄</div>':
        groups.map(g=>`
          <div class="list-row" data-no="${g.no}" data-status="${g.status}">
            <div class="list-no">${g.no}</div>
            <div class="list-info">
              <div class="list-client">${g.customer}</div>
              <div class="list-date">${g.date} · ${g.items.map(i=>i.item+'×'+i.qty).join(', ')}</div>
            </div>
            <div class="list-right">
              <div class="list-amt ${g.status==='作廢'?'void':''}">$${g.total.toLocaleString()}</div>
              <span class="badge badge-${g.status==='待請款'?'pending':g.status==='作廢'?'void':'ok'}">${g.status}</span>
            </div>
          </div>`).join('')}
    </div></div>`;
}

function buildInvoice() {
  const rows = getInvoiceRows();
  const groups = groupShipments(rows);
  const total = getTotalAmt(rows);
  const pendingInv = state.invoices.filter(i=>i.status==='已請款');
  const receivedInv = state.invoices.filter(i=>i.status==='已收款');
  return `
    <div class="topbar"><span class="topbar-title">請款管理</span></div>
    <div class="content">
      <div class="card">
        <div class="card-header"><span class="card-title">選擇客戶產出請款單</span></div>
        ${state.customers.map(c=>`
          <div class="select-btn" data-inv-customer="${c}">
            <span class="select-btn-name ${state.invoiceCustomer===c?'select-active':''}">${c}</span>
            ${state.invoiceCustomer===c?'<span style="color:#534AB7">✓</span>':''}
          </div>`).join('')}
      </div>
      ${state.invoiceCustomer?`
        <div class="inv-total-box">
          <span class="inv-total-label">${state.invoiceCustomer} 待請款</span>
          <span class="inv-total-val">$${total.toLocaleString()}</span>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">待請款出貨明細</span></div>
          ${groups.length===0?'<div class="empty">無待請款紀錄</div>':
            groups.map(g=>`
              <div class="list-row">
                <div class="list-no">${g.no}</div>
                <div class="list-info">
                  <div class="list-client">${g.items.map(i=>i.item+'×'+i.qty).join(', ')}</div>
                  <div class="list-date">${g.date}</div>
                </div>
                <div class="list-right"><div class="list-amt">$${g.total.toLocaleString()}</div></div>
              </div>`).join('')}
        </div>
        ${groups.length>0?`<button class="btn-primary" id="btn-save-invoice">儲存並列印請款單</button>`:''}
      `:''}
      ${pendingInv.length>0?`
        <div class="card" style="margin-top:16px;">
          <div class="card-header"><span class="card-title">已請款（待收款）</span></div>
          ${pendingInv.map(inv=>`
            <div class="inv-record-row">
              <div class="inv-record-top">
                <span class="inv-record-no">${inv.invoiceNo}</span>
                <span class="inv-record-amt">$${Number(inv.totalAmt).toLocaleString()}</span>
              </div>
              <div class="inv-record-bottom">
                <span class="inv-record-info">${inv.customer} · ${inv.date}</span>
                <div class="inv-record-actions">
                  <button class="btn-small" data-reprint="${inv.invoiceNo}">列印</button>
                  <button class="btn-small-green" data-payment="${inv.invoiceNo}">確認收款</button>
                </div>
              </div>
            </div>`).join('')}
        </div>`:''}
      ${receivedInv.length>0?`
        <div class="card" style="margin-top:8px;">
          <div class="card-header"><span class="card-title">已收款紀錄</span></div>
          ${receivedInv.map(inv=>`
            <div class="inv-record-row">
              <div class="inv-record-top">
                <span class="inv-record-no">${inv.invoiceNo}</span>
                <span class="inv-record-amt" style="color:#888;">$${Number(inv.totalAmt).toLocaleString()}</span>
              </div>
              <div class="inv-record-bottom">
                <span class="inv-record-info">${inv.customer} · ${inv.receiveDate} · ${inv.receiveMethod}</span>
                <button class="btn-small" data-reprint="${inv.invoiceNo}">列印</button>
              </div>
            </div>`).join('')}
        </div>`:''}
    </div>`;
}

function buildItemSheet() {
  const added = state.newShipment.items.map(i=>i.name);
  const items = state.itemMap[state.newShipment.customer] || [];
  return `
    <div class="sheet-overlay" id="sheet-overlay">
      <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">${state.newShipment.customer} — 品項清單</div>
        ${items.map(item=>`
          <div class="sheet-item">
            <div class="sheet-item-info">
              <div class="sheet-item-name">${item.name}</div>
              <div class="sheet-item-price">$${item.price} / 個</div>
            </div>
            ${added.includes(item.name)?'<span class="sheet-added">已加入</span>':
              `<button class="sheet-add-btn" data-item='${JSON.stringify(item)}'>加入</button>`}
          </div>`).join('')}
      </div>
    </div>`;
}

function buildVoidModal() {
  return `<div class="modal-overlay"><div class="modal">
    <div class="modal-title">作廢出貨單</div>
    <div class="modal-msg">確定要作廢 <strong>${state.selectedShipment}</strong> 嗎？<br>單號會保留，但不計入請款。</div>
    <div class="modal-btns">
      <button class="modal-cancel" id="btn-void-cancel">取消</button>
      <button class="modal-confirm-red" id="btn-void-confirm">確定作廢</button>
    </div>
  </div></div>`;
}

function buildUnvoidModal() {
  return `<div class="modal-overlay"><div class="modal">
    <div class="modal-title">取消作廢</div>
    <div class="modal-msg">確定要把 <strong>${state.selectedShipment}</strong> 恢復成「待請款」嗎？</div>
    <div class="modal-btns">
      <button class="modal-cancel" id="btn-unvoid-cancel">取消</button>
      <button class="modal-confirm-blue" id="btn-unvoid-confirm">確定恢復</button>
    </div>
  </div></div>`;
}

function buildPaymentModal() {
  return `<div class="modal-overlay"><div class="modal">
    <div class="modal-title">確認收款</div>
    <div class="modal-msg">請款單：<strong>${state.paymentInvoiceNo}</strong></div>
    <div style="font-size:13px;color:#888;margin-bottom:6px;">收款日期</div>
    <input type="date" value="${state.paymentDate}" id="inp-payment-date" style="width:100%;margin-bottom:12px;">
    <div style="font-size:13px;color:#888;margin-bottom:6px;">收款方式</div>
    <div class="method-grid">
      <button class="method-btn ${state.paymentMethod==='現金'?'selected':''}" data-method="現金">現金</button>
      <button class="method-btn ${state.paymentMethod==='轉帳'?'selected':''}" data-method="轉帳">轉帳</button>
      <button class="method-btn ${state.paymentMethod==='支票'?'selected':''}" data-method="支票">支票</button>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" id="btn-payment-cancel">取消</button>
      <button class="modal-confirm-green" id="btn-payment-confirm">確認收款</button>
    </div>
  </div></div>`;
}

function bindEvents() {
  const selCustomer = document.getElementById('sel-customer');
  if (selCustomer) selCustomer.onclick = showCustomerSheet;
  const inpDate = document.getElementById('inp-date');
  if (inpDate) inpDate.onchange = e => { state.newShipment.date = e.target.value; };
  const inpNote = document.getElementById('inp-note');
  if (inpNote) inpNote.oninput = e => { state.newShipment.note = e.target.value; };
  const btnAddItem = document.getElementById('btn-add-item');
  if (btnAddItem) btnAddItem.onclick = () => { state.showItemSheet = true; render(); };
  const btnSave = document.getElementById('btn-save');
  if (btnSave) btnSave.onclick = saveShipment;
  const btnSaveInvoice = document.getElementById('btn-save-invoice');
  if (btnSaveInvoice) btnSaveInvoice.onclick = saveInvoice;
  document.querySelectorAll('.qty-input').forEach(inp => {
    inp.oninput = e => {
      const idx = parseInt(e.target.getAttribute('data-idx'));
      state.newShipment.items[idx].qty = parseInt(e.target.value)||0;
      const subs = document.querySelectorAll('.item-subtotal');
      if (subs[idx]) subs[idx].textContent = '$'+(state.newShipment.items[idx].qty*state.newShipment.items[idx].price).toLocaleString();
      const tv = document.querySelector('.total-val');
      if (tv) tv.textContent = '$'+state.newShipment.items.reduce((s,i)=>s+(i.qty*i.price||0),0).toLocaleString();
    };
  });
  document.querySelectorAll('[data-del]').forEach(btn => {
    btn.onclick = e => { state.newShipment.items.splice(parseInt(e.target.getAttribute('data-del')),1); render(); };
  });
  document.querySelectorAll('[data-no]').forEach(row => {
    row.onclick = () => {
      state.selectedShipment = row.getAttribute('data-no');
      state.selectedShipmentStatus = row.getAttribute('data-status');
      if (row.getAttribute('data-status')==='作廢') state.showUnvoidModal = true;
      else state.showVoidModal = true;
      render();
    };
  });
  const sheetOverlay = document.getElementById('sheet-overlay');
  if (sheetOverlay) sheetOverlay.onclick = e => { if (e.target===sheetOverlay) { state.showItemSheet=false; render(); } };
  document.querySelectorAll('.sheet-add-btn').forEach(btn => {
    btn.onclick = e => {
      const item = JSON.parse(e.target.getAttribute('data-item'));
      state.newShipment.items.push({ name:item.name, price:Number(item.price), qty:0 });
      render();
    };
  });
  document.querySelectorAll('[data-inv-customer]').forEach(el => {
    el.onclick = () => { state.invoiceCustomer = el.getAttribute('data-inv-customer'); render(); };
  });
  document.querySelectorAll('[data-reprint]').forEach(btn => {
    btn.onclick = e => { e.stopPropagation(); printInvoiceByNo(btn.getAttribute('data-reprint')); };
  });
  document.querySelectorAll('[data-payment]').forEach(btn => {
    btn.onclick = e => {
      e.stopPropagation();
      state.paymentInvoiceNo = btn.getAttribute('data-payment');
      state.paymentDate = today();
      state.paymentMethod = '';
      state.showPaymentModal = true;
      render();
    };
  });
  document.querySelectorAll('[data-method]').forEach(btn => {
    btn.onclick = () => { state.paymentMethod = btn.getAttribute('data-method'); render(); };
  });
  const inpPayDate = document.getElementById('inp-payment-date');
  if (inpPayDate) inpPayDate.onchange = e => { state.paymentDate = e.target.value; };
  const btnVoidCancel = document.getElementById('btn-void-cancel');
  if (btnVoidCancel) btnVoidCancel.onclick = () => { state.showVoidModal=false; state.selectedShipment=null; render(); };
  const btnVoidConfirm = document.getElementById('btn-void-confirm');
  if (btnVoidConfirm) btnVoidConfirm.onclick = voidShipment;
  const btnUnvoidCancel = document.getElementById('btn-unvoid-cancel');
  if (btnUnvoidCancel) btnUnvoidCancel.onclick = () => { state.showUnvoidModal=false; state.selectedShipment=null; render(); };
  const btnUnvoidConfirm = document.getElementById('btn-unvoid-confirm');
  if (btnUnvoidConfirm) btnUnvoidConfirm.onclick = unvoidShipment;
  const btnPaymentCancel = document.getElementById('btn-payment-cancel');
  if (btnPaymentCancel) btnPaymentCancel.onclick = () => { state.showPaymentModal=false; render(); };
  const btnPaymentConfirm = document.getElementById('btn-payment-confirm');
  if (btnPaymentConfirm) btnPaymentConfirm.onclick = confirmPayment;
}

function showCustomerSheet() {
  const overlay = document.createElement('div');
  overlay.className = 'sheet-overlay';
  overlay.innerHTML = `<div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">選擇客戶</div>
    ${state.customers.map(c=>`<div class="sheet-item" style="cursor:pointer" data-cust="${c}">
      <div class="sheet-item-info"><div class="sheet-item-name">${c}</div></div>
    </div>`).join('')}
  </div>`;
  document.getElementById('app').appendChild(overlay);
  overlay.onclick = e => {
    const cust = e.target.closest('[data-cust]');
    if (cust) { state.newShipment.customer=cust.getAttribute('data-cust'); state.newShipment.items=[]; overlay.remove(); render(); }
    else if (e.target===overlay) overlay.remove();
  };
}

function setPage(p) { state.page=p; render(); }
init();
</script>
</body>
</html>
